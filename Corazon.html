<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You ❤</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;width:100vw;height:100vh;overflow:hidden}
  canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
  const c   = document.getElementById('c');
  const ctx = c.getContext('2d');
  const N   = 120;
  const LABEL = 'I love you';
  const TAU   = Math.PI * 2;
  const SPEED = 0.0035;

  let W, H, CX, CY, SCALE;

  function resize(){
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
    CX = W / 2;
    CY = H / 2;
    SCALE = Math.min(W, H) / 38;
  }
  resize();
  window.addEventListener('resize', resize);

  /* Precalcular partículas */
  const p = new Float32Array(N * 4); /* offset, speed, size, phase */
  for(let i = 0; i < N; i++){
    const b = i * 4;
    p[b]   = (i / N) * TAU;               /* offset */
    p[b+1] = 0.65 + Math.random() * 0.7;  /* speed multiplier */
    p[b+2] = 12 + Math.random() * 8;      /* font size px */
    p[b+3] = Math.random() * TAU;         /* phase for pulse */
  }

  /* Ecuación corazón inline para evitar call overhead */
  let elapsed = 0;
  let last = 0;

  function frame(ts){
    const dt = last ? (ts - last) / 1000 : 0;
    last = ts;
    elapsed += dt;

    /* Trail — fill semitransparente en lugar de clearRect */
    ctx.globalAlpha = 0.18;
    ctx.fillStyle   = '#000';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;

    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    for(let i = 0; i < N; i++){
      const b  = i * 4;
      const t  = p[b] + elapsed * SPEED * p[b+1] * TAU;
      const st = Math.sin(t);
      const ct = Math.cos(t);

      const hx =  16 * st * st * st;
      const hy = -(13 * ct - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

      const x = CX + hx * SCALE;
      const y = CY + hy * SCALE;

      const pulse  = 0.5 + 0.5 * Math.sin(elapsed * 1.6 + p[b+3]);
      const sz     = p[b+2] + pulse * 3;
      const alpha  = 0.5 + pulse * 0.5;
      const blur   = 8 + pulse * 14;

      ctx.globalAlpha   = alpha;
      ctx.shadowColor   = '#ea80b0';
      ctx.shadowBlur    = blur;
      ctx.fillStyle     = '#ea80b0';
      ctx.font          = `600 ${sz.toFixed(0)}px sans-serif`;
      ctx.fillText(LABEL, x, y);
    }

    /* Segundo pase: brillo blanco fino */
    ctx.shadowColor = '#fff';
    ctx.shadowBlur  = 4;
    ctx.globalAlpha = 0.18;
    ctx.fillStyle   = '#fff';
    for(let i = 0; i < N; i += 3){
      const b  = i * 4;
      const t  = p[b] + elapsed * SPEED * p[b+1] * TAU;
      const st = Math.sin(t);
      const ct = Math.cos(t);
      const hx =  16 * st * st * st;
      const hy = -(13 * ct - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
      ctx.font = `600 ${(p[b+2] * 0.7).toFixed(0)}px sans-serif`;
      ctx.fillText(LABEL, CX + hx * SCALE, CY + hy * SCALE);
    }

    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
